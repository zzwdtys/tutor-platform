spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tutor_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowMultiQueries=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:init_new_tables.sql
      continue-on-error: true
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.tutor.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

jwt:
  secret: your_jwt_secret_key_at_least_256_bits_long_123456
  expire: 86400000  # 24小时

wx:
  appid: wxedc9290bb00b86ba
  secret: fbeb98ae68a8e933af359d55d435e141
  login-url: https://api.weixin.qq.com/sns/jscode2session

server:
  port: 8080
  base-url: http://127.0.0.1:8080

upload:
  path: D:/school/web/project/uploadImage/

spring.servlet.multipart.max-file-size: 5MB

ai:
  deepseek:
    api-key: ${AI_DEEPSEEK_API_KEY:placeholder}
    base-url: https://api.deepseek.com/v1

