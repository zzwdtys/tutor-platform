# 云托管环境配置
# 部署时复制此文件覆盖 application.yml 中的数据库和Redis配置

spring:
  datasource:
    url: jdbc:mysql://你的云数据库地址:3306/tutor_db?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: 你的数据库用户名
    password: 你的数据库密码
  redis:
    host: 你的Redis地址   # 如果不用Redis，可注释掉
    port: 6379
  sql:
    init:
      mode: always
      schema-locations: classpath:init_new_tables.sql
      continue-on-error: true

server:
  base-url: https://你的云托管域名
